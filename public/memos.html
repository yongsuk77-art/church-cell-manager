<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>메모 · 공동체관리</title>
    <meta name="description" content="공동체관리 메모">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#fffdf8">
    <link rel="icon" href="/favicon.png?v=community-icon-3" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=community-icon-3">
    <link rel="stylesheet" href="/memos.css?v=keep-memos-10">
  </head>
  <body>
    <div class="memo-app">
      <header class="memo-topbar">
        <a class="icon-action back-action" href="/" aria-label="공동체관리로 돌아가기" title="돌아가기">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
        </a>
        <div class="brand-block">
          <span class="brand-mark" aria-hidden="true">M</span>
          <div><strong>메모</strong><small id="communityLabel">공동체관리</small></div>
        </div>
        <label class="memo-search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-4-4"></path></svg>
          <input id="searchInput" type="search" autocomplete="off" placeholder="메모, 교인, 사진 검색">
        </label>
        <button class="icon-action" id="refreshBtn" type="button" aria-label="새로고침" title="새로고침">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0 2 5"></path><path d="M20 4v7h-7"></path></svg>
        </button>
        <button class="primary-action top-new-button" id="topNewBtn" type="button">새 메모</button>
      </header>

      <div class="memo-layout">
        <nav class="memo-nav" aria-label="메모 탐색">
          <button class="nav-item active" type="button" data-filter="all">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18h6M10 22h4"></path><path d="M8.5 14.5A7 7 0 1 1 15.5 14.5c-1 .8-1.5 1.5-1.5 2.5h-4c0-1-.5-1.7-1.5-2.5Z"></path></svg>
            <span>전체 메모</span>
          </button>
          <button class="nav-item" type="button" data-filter="reminders">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="13" r="8"></circle><path d="M12 9v4l3 2M9 2h6"></path></svg>
            <span>알림</span>
          </button>
          <button class="nav-item" type="button" data-filter="people">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="8" r="4"></circle><path d="M2 21a7 7 0 0 1 14 0M16 4a4 4 0 0 1 0 8M17 15a6 6 0 0 1 5 6"></path></svg>
            <span>교인 연결</span>
          </button>
          <div class="memo-nav-category-section">
            <span class="memo-nav-section-title">분류</span>
            <div class="category-filter-bar" id="categoryFilterBar" role="group" aria-label="분류별 메모 바로 보기"></div>
          </div>
          <button class="nav-item" type="button" data-filter="trash">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M19 6l-1 15H6L5 6M10 11v6M14 11v6"></path></svg>
            <span>휴지통</span>
          </button>
        </nav>

        <main class="memo-main">
          <div class="member-scope hidden" id="memberScope">
            <span id="memberScopeLabel"></span>
            <button id="memberScopeClearBtn" type="button">전체 메모 보기</button>
          </div>
          <section class="quick-note color-default" id="quickNote" aria-labelledby="quickNoteLabel">
            <label class="sr-only" id="quickNoteLabel" for="quickBody">새 메모 내용</label>
            <textarea id="quickBody" rows="1" maxlength="50000" placeholder="메모 작성… (첫 줄이 제목이 됩니다)"></textarea>
            <div class="quick-expanded hidden" id="quickExpanded">
              <div class="quick-style-row">
                <div class="field compact-field quick-category-field">
                  <span>분류</span>
                  <div class="category-select-row">
                    <select id="quickCategory" aria-label="메모 분류"></select>
                    <button class="category-tool-button" id="quickCategoryManageBtn" type="button">분류 관리</button>
                  </div>
                </div>
                <div class="quick-color-field">
                  <span>색상</span>
                  <div class="palette" id="quickPalette" aria-label="메모 배경색"></div>
                </div>
              </div>
              <div class="quick-actions">
                <div class="quick-action-tools">
                  <label class="tool-action file-action">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="8" cy="10" r="1.5"></circle><path d="m21 15-5-5L5 19"></path></svg>
                    <span>사진</span>
                    <input id="quickPhotos" type="file" accept="image/jpeg,image/png,image/webp,image/gif,image/heic,image/heif" multiple>
                  </label>
                  <div class="quick-reminder-control" id="quickReminderControl">
                    <button class="tool-action reminder-action" id="quickReminderBtn" type="button" aria-expanded="false">
                      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path><path d="M13.7 21a2 2 0 0 1-3.4 0"></path></svg>
                      <span id="quickReminderButtonLabel">알림</span>
                    </button>
                    <div class="quick-reminder-panel hidden" id="quickReminderPanel">
                      <label for="quickRemindAt">알림 날짜와 시간</label>
                      <input id="quickRemindAt" type="datetime-local">
                      <div><button class="text-action" id="quickReminderClearBtn" type="button">알림 지우기</button><button class="primary-action" id="quickReminderDoneBtn" type="button">확인</button></div>
                    </div>
                  </div>
                  <div class="quick-member-inline member-picker" id="quickMemberPicker">
                    <span class="sr-only">교인 연결</span>
                    <input id="quickMemberId" type="hidden" value="">
                    <div class="member-picker-row">
                      <button class="member-search-toggle" id="quickMemberSearchBtn" type="button">교인 검색</button>
                      <button class="member-clear-button hidden" id="quickMemberClearBtn" type="button">해제</button>
                    </div>
                    <span class="member-selection" id="quickMemberSelection">연결 안 함</span>
                    <div class="member-search-panel hidden" id="quickMemberSearchPanel">
                      <input id="quickMemberSearchInput" type="search" autocomplete="off" placeholder="이름을 1글자부터 검색">
                      <div class="member-search-results" id="quickMemberSearchResults" role="listbox" aria-label="교인 검색 결과"></div>
                    </div>
                  </div>
                  <span class="file-summary" id="quickFileSummary"></span>
                </div>
                <div class="quick-action-buttons">
                  <button class="text-action" id="quickCancelBtn" type="button">취소</button>
                  <button class="primary-action" id="quickSaveBtn" type="button">저장</button>
                </div>
              </div>
            </div>
          </section>

          <div class="note-list-toolbar">
            <span id="noteCount" aria-live="polite"></span>
            <div class="note-toolbar-controls">
              <div class="layout-switch" role="group" aria-label="메모 배치 방식">
                <button id="gridLayoutBtn" type="button" aria-label="그리드로 보기" title="그리드로 보기">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg>
                </button>
                <button id="listLayoutBtn" type="button" aria-label="목록으로 보기" title="목록으로 보기">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13"></path><circle cx="4" cy="6" r="1"></circle><circle cx="4" cy="12" r="1"></circle><circle cx="4" cy="18" r="1"></circle></svg>
                </button>
              </div>
              <label class="sort-control" for="sortSelect">
                <span>날짜 정렬</span>
                <select id="sortSelect">
                  <option value="updated-desc">최근 수정순</option>
                  <option value="updated-asc">오래된 수정순</option>
                  <option value="created-desc">최근 작성순</option>
                  <option value="created-asc">오래된 작성순</option>
                </select>
              </label>
            </div>
          </div>

          <div class="loading-state" id="loadingState" role="status">메모를 불러오는 중입니다…</div>
          <section class="note-section hidden" id="pinnedSection">
            <h2>고정됨</h2>
            <div class="memo-grid" id="pinnedGrid"></div>
          </section>
          <section class="note-section hidden" id="notesSection">
            <h2 id="notesHeading">메모</h2>
            <div class="memo-grid" id="notesGrid"></div>
          </section>
          <div class="empty-state hidden" id="emptyState">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18h6M10 22h4"></path><path d="M8.5 14.5A7 7 0 1 1 15.5 14.5c-1 .8-1.5 1.5-1.5 2.5h-4c0-1-.5-1.7-1.5-2.5Z"></path></svg>
            <strong id="emptyTitle">표시할 메모가 없습니다</strong>
            <span id="emptyDescription">위 입력창에서 첫 메모를 남겨보세요.</span>
          </div>
        </main>
      </div>
    </div>

    <dialog class="note-editor" id="editorDialog" aria-labelledby="editorHeading">
      <form method="dialog" class="editor-shell" id="editorForm">
        <div class="editor-topbar">
          <div>
            <h2 id="editorHeading">메모 수정</h2>
            <div class="editor-timestamps" id="editorTimestamps"></div>
          </div>
          <div class="editor-top-actions">
            <label class="pin-toggle" title="상단 고정"><input id="editorPinned" type="checkbox"><span>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3h8"></path><path d="M9 3v6l-3 4v2h12v-2l-3-4V3"></path><path d="M12 15v6"></path></svg>
            </span></label>
            <button class="icon-action" id="editorCloseBtn" type="button" aria-label="저장 후 닫기" title="저장 후 닫기">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"></path></svg>
            </button>
          </div>
        </div>

        <div class="editor-photo-grid" id="editorPhotoGrid"></div>
        <label class="sr-only" for="editorBody">메모 내용</label>
        <textarea id="editorBody" maxlength="50000" placeholder="메모 작성…"></textarea>

        <div class="editor-fields">
          <div class="field member-picker" id="editorMemberPicker">
            <span>교인 연결</span>
            <input id="editorMemberId" type="hidden" value="">
            <div class="member-picker-row">
              <button class="member-search-toggle" id="editorMemberSearchBtn" type="button">교인 검색</button>
              <button class="member-clear-button hidden" id="editorMemberClearBtn" type="button">연결 해제</button>
            </div>
            <span class="member-selection" id="editorMemberSelection">연결 안 함</span>
            <div class="member-search-panel hidden" id="editorMemberSearchPanel">
              <input id="editorMemberSearchInput" type="search" autocomplete="off" placeholder="이름을 1글자부터 검색">
              <div class="member-search-results" id="editorMemberSearchResults" role="listbox" aria-label="교인 검색 결과"></div>
            </div>
          </div>
          <label class="field"><span>그룹 연결</span><select id="editorGroupId"><option value="">연결 안 함</option></select></label>
          <label class="field"><span>알림</span><input id="editorRemindAt" type="datetime-local"></label>
          <div class="field">
            <span>분류</span>
            <div class="category-select-row">
              <select id="editorCategory" aria-label="메모 분류"></select>
              <button class="category-tool-button" id="editorCategoryManageBtn" type="button">분류 관리</button>
            </div>
          </div>
        </div>

        <div class="editor-color-row"><span>배경색</span><div class="palette" id="editorPalette" aria-label="메모 배경색"></div></div>
        <div class="editor-file-summary" id="editorFileSummary"></div>
        <div class="editor-footer">
          <div class="editor-tools">
            <label class="tool-action file-action">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="8" cy="10" r="1.5"></circle><path d="m21 15-5-5L5 19"></path></svg>
              <span>사진 추가</span>
              <input id="editorPhotos" type="file" accept="image/jpeg,image/png,image/webp,image/gif,image/heic,image/heif" multiple>
            </label>
            <button class="tool-action danger-action" id="editorDeleteBtn" type="button">삭제</button>
          </div>
          <button class="primary-action" id="editorSaveBtn" type="submit">완료</button>
        </div>
      </form>
    </dialog>

    <dialog class="category-dialog" id="categoryDialog" aria-labelledby="categoryDialogTitle">
      <div class="category-dialog-shell">
        <div class="category-dialog-header">
          <div><h2 id="categoryDialogTitle">메모 분류 관리</h2><p>분류를 만들거나 이름을 수정하고, 사용하지 않는 분류를 삭제할 수 있습니다.</p></div>
          <button class="icon-action" id="categoryDialogCloseBtn" type="button" aria-label="분류 관리 닫기" title="닫기">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"></path></svg>
          </button>
        </div>
        <form class="category-create-form" id="categoryCreateForm">
          <label for="categoryNameInput">새 분류 이름</label>
          <div><input id="categoryNameInput" maxlength="80" autocomplete="off" placeholder="예: 새가족"><button class="primary-action" id="categoryCreateSubmitBtn" type="submit">추가</button></div>
        </form>
        <div class="category-manage-list" id="categoryManageList"></div>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/memos.js?v=keep-memos-11"></script>
  </body>
</html>
