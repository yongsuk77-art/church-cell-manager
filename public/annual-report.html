<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>공동체 사진요람</title>
    <link rel="icon" href="/favicon.png?v=community-icon-2" type="image/png" sizes="512x512">
    <link rel="stylesheet" href="./annual-report.css?v=annual-report-5">
  </head>
  <body>
    <div class="annual-toolbar" aria-label="연감 도구">
      <div>
        <strong>공동체 사진요람</strong>
        <span id="annualStatus">자료를 불러오는 중입니다</span>
      </div>

      <label class="annual-check">
        <input id="annualShowLongAbsent" type="checkbox">
        <span>장기결석 표시</span>
      </label>
      <label class="annual-check">
        <input id="annualShowLogo" type="checkbox" checked>
        <span>교회로고 표시</span>
      </label>
      <button id="annualRefreshBtn" type="button" title="최신 성도, 사진, 설정 자료를 다시 불러옵니다">자료 새로고침</button>
      <button id="annualPrintBtn" class="primary" type="button">PDF 저장</button>
      <button id="annualBackBtn" class="annual-home-button" type="button" title="메인으로 이동" aria-label="메인으로 이동">
        <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <path d="M3 10.5 12 3l9 7.5" />
          <path d="M5.5 9.5V21h13V9.5" />
          <path d="M9.5 21v-7h5v7" />
        </svg>
        <span>메인</span>
      </button>
    </div>

    <div id="annualPrintNotice" class="annual-print-notice" hidden role="status" aria-live="polite"></div>

    <main id="annualBook" class="annual-book" aria-live="polite"></main>

    <script src="./annual-report.js?v=annual-report-5"></script>
  </body>
</html>
